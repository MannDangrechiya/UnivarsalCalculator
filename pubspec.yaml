name: universal_calculator
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Core
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  intl: ^0.19.0

  # State Management
  get: ^4.7.2

  # Data & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0

  # Math & Graphing
  math_expressions: ^2.3.1
  json_annotation: ^4.9.0

  # ✅ Stable fl_chart compatible with Flutter 3.8+
  fl_chart: ^0.66.2
  firebase_core: ^2.28.0
  cloud_firestore: ^4.9.0

  # Vector math (fixed version compatible with fl_chart)
  # vector_math: ^2.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  json_serializable: ^6.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
